steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - apps/static-site/Dockerfile
      - -t
      - ${_IMAGE}
      - .
images:
  - ${_IMAGE}
options:
  logging: CLOUD_LOGGING_ONLY
substitutions:
  _IMAGE: us-central1-docker.pkg.dev/$PROJECT_ID/golf-store-static-site/static-site:latest

