<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Standalone CX Injection Demo</title>
    <style>
      body {
        background: #f4f7fb;
        color: #172033;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
      }

      main {
        display: grid;
        gap: 20px;
        margin: 0 auto;
        max-width: 980px;
        padding: 24px;
      }

      #standalone-target {
        max-width: 720px;
      }

      pre {
        background: #101828;
        border-radius: 8px;
        color: #e6edf7;
        overflow-x: auto;
        padding: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Standalone Web Injection</h1>
      <section id="standalone-target" aria-label="Injected CX widget"></section>
      <h2>Latest widget event</h2>
      <pre id="event-log">{}</pre>
    </main>
    <script type="module" src="/demo/demo.ts"></script>
  </body>
</html>
