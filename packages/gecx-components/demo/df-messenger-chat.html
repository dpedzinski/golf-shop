<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>df-messenger-chat Demo</title>
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
    <style>
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(320px, 1fr) minmax(320px, 420px);
        min-height: 100vh;
      }

      .content {
        padding: 24px;
      }

      @media (max-width: 820px) {
        .layout {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <main class="content">
        <h1>Always Open Chat Demo</h1>
        <section id="demo-root" aria-label="Standalone preview"></section>
      </main>
      <df-messenger project-id="PROJECT_ID" agent-id="AGENT_ID" language-code="en" location="global" url-allowlist="*">
        <df-messenger-chat chat-title="CX Demo" placeholder-text="Ask about financing"></df-messenger-chat>
      </df-messenger>
    </div>
    <script type="module" src="/demo/demo.ts"></script>
  </body>
</html>
