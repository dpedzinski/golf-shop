<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dialogflow CX Messenger Custom Template Demo</title>
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
    <style>
      body {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 24px;
      }

      main {
        display: grid;
        gap: 18px;
        max-width: 900px;
      }

      pre {
        background: #101828;
        border-radius: 8px;
        color: #e6edf7;
        overflow-x: auto;
        padding: 14px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Dialogflow CX Messenger Custom Template</h1>
      <button id="render-rich-content" type="button">Render sample rich content</button>
      <pre id="custom-template-json"></pre>
      <pre id="fallback-json"></pre>
    </main>
    <df-messenger
      project-id="PROJECT_ID"
      agent-id="AGENT_ID"
      language-code="en"
      location="global"
      url-allowlist="*">
      <df-messenger-chat-bubble chat-title="CX Demo"></df-messenger-chat-bubble>
    </df-messenger>
    <script type="module" src="/demo/demo.ts"></script>
  </body>
</html>
