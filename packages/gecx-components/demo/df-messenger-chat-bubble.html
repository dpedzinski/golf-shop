<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>df-messenger-chat-bubble Demo</title>
    <script src="https://www.gstatic.com/dialogflow-console/fast/messenger/bootstrap.js?v=1"></script>
    <style>
      body {
        background: #f4f7fb;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
      }

      main {
        display: grid;
        gap: 18px;
        max-width: 960px;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Chat Bubble Demo</h1>
      <section id="demo-root" aria-label="Standalone preview"></section>
    </main>
    <df-messenger project-id="PROJECT_ID" agent-id="AGENT_ID" language-code="en" location="global" url-allowlist="*">
      <df-messenger-chat-bubble
        chat-title="CX Demo"
        chat-width="380"
        chat-height="560"
        allow-fullscreen="small">
      </df-messenger-chat-bubble>
    </df-messenger>
    <script type="module" src="/demo/demo.ts"></script>
  </body>
</html>
