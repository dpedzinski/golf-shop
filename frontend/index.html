<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FairwayIQ Golf Shop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            golf: {
              50: '#f0fdf4',
              100: '#dcfce7',
              500: '#22c55e',
              700: '#15803d',
              800: '#166534',
              900: '#14532d',
            }
          }
        }
      }
    }
  </script>
  
  <!-- Gemini Customer Experience Agent Scripts -->
  <script defer src="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/chat-messenger.js"></script>
  <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-default.css">
  <link rel="stylesheet" href="https://www.gstatic.com/chat-messenger/sdk/prod/v1.16/themes/chat-messenger-layout.css">

  </head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
  
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>

  <!-- Gemini Chatbot Initialization -->
  <script>
    window.addEventListener("chat-messenger-loaded", () => {
      chatSdk.registerContext(
        chatSdk.prebuilts.ces.createContext({
          deploymentName: "projects/817026452665/locations/us/apps/7da359a7-d2a4-420d-85a1-36c697d9c77d/deployments/106211f0-2603-4b66-bea6-1774d396fbd2",
          tokenBroker: {
            enableTokenBroker: true,
            enableRecaptcha: true
          }
        }),
      );
    });
  </script>

  <!-- Gemini Chatbot Widget -->
  <!-- Update the url-allowlist attribute with a comma-separated list of origins allowed to render images -->
  <chat-messenger
    url-allowlist="*"
    color-scheme="dark"
  >
    <chat-messenger-container
      chat-title="Golf AI"
      chat-title-icon="https://gstatic.com/dialogflow-console/common/assets/ccai-favicons/conversational_agents.png"
      enable-file-upload
      enable-audio-input
    >
      <chat-reset-session-button
        slot="titlebar-actions"
        title-text="Start new chat"
      ></chat-reset-session-button>
      <chat-toggle-dialog-button
        slot="titlebar-actions"
        title-text-expanded="Collapse"
        title-text-collapsed="Expand"
      ></chat-toggle-dialog-button>
      <chat-messenger-close-button
        slot="titlebar-actions"
        title-text="Close"
      ></chat-messenger-close-button>
    </chat-messenger-container>
  </chat-messenger>

<script type="module" src="/index.js"></script></body>
</html>
